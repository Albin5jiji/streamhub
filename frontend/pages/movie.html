<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>StreamHub | Movie Details</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">

        <div class="logo">STREAMHUB</div>

        <nav>
            <a href="index.html">Home</a>
            <a href="browse.html">Browse</a>
        </nav>

    </header>


    <main>

        <!-- MOVIE HERO BACKDROP -->
        <section id="movieHero" class="movie-hero">
            <!-- Filled dynamically -->
        </section>


        <!-- MOVIE DETAILS -->
        <section id="movieDetails" class="movie-details">
            <!-- Filled dynamically -->
        </section>


        <!-- CAST -->
        <section class="cast-section">

            <h2>Cast</h2>

            <div id="castGrid" class="cast-grid">
                <!-- Filled dynamically -->
            </div>

        </section>


        <!-- TRAILER -->
        <section class="trailer-section">

            <h2>Trailer</h2>

            <div id="trailer">
                <!-- YouTube iframe injected -->
            </div>

        </section>


        <!-- STREAMING PROVIDERS -->
        <section class="providers-section">

            <h2>Available On</h2>

            <div id="providers" class="providers">
                <!-- Provider logos -->
            </div>

        </section>


        <!-- RECOMMENDATIONS -->
        <section class="recommendations-section">

            <h2>Recommended Movies</h2>

            <div id="recommendations" class="content-grid">
                <!-- Recommended movies -->
            </div>

        </section>

    </main>


    <script src="../js/script.js"></script>

</body>

</html>
